name: docker-smoke

on:
  push:
  pull_request:

jobs:
  docker-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - run: docker build -t ruby-stakeholder .
      - run: docker run --rm ruby-stakeholder --list-values
      - run: docker run --rm ruby-stakeholder --dev-type security --jargon high --complexity extreme --alerts --team --trace --seed 41 --output-format json --duration 0 --project hospital-ocpp-quantum-control --framework mcp-grpc
      - run: docker run --rm ruby-stakeholder --experimental-provider openai-compatible
        continue-on-error: true
