name: ci-native

on:
  push:
  pull_request:

jobs:
  native:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler: false
      - run: ruby scripts/validate_contract.rb
      - run: ruby -Ilib -Itest test/test_ruby_stakeholder.rb
