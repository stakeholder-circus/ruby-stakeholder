name: ci

on:
  push:
  pull_request:

jobs:
  contract-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'
          bundler: false
      - run: ruby bin/ruby-stakeholder --list-values
      - run: ruby bin/ruby-stakeholder --dev-type security --jargon high --complexity extreme --alerts --team --trace --seed 41 --output-format json --duration 0 --project hospital-ocpp-quantum-control --framework mcp-grpc
